<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/dsf-web1.0/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Trae Project</title>
    <script>
      (function() {
        var base = '/dsf-web1.0/';
        var path = window.location.pathname;
        if (path.startsWith(base)) {
          var route = path.slice(base.length);
          if (route && !route.startsWith('index.html')) {
            sessionStorage.setItem('spa-redirect', route);
          }
        }
        window.location.replace(base + 'index.html');
      })();
    </script>
  </head>
  <body>
  </body>
</html>
